name: Deploy naar Versio (FTP)

# Publiceert de website automatisch naar je Versio-hosting bij elke push
# naar de branch hieronder. Kan ook handmatig gestart worden (Run workflow).
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload via FTP naar /bibliotheek
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Doelmap op de webserver. Pas aan naar jouw structuur, bijv.
          # /domains/remigommans.nl/public_html/bibliotheek/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          # Alleen de website-bestanden uploaden, geen repo-onzin
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            README.md
            DEPLOY-VERSIO.md
